<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Enter Fairytopia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink:     #FF79C0;
      --hot:      #FF1E9E;
      --lavender: #C8A8F5;
      --purple:   #7B2FBE;
      --gold:     #FFD56B;
      --deep:     #1A0030;
      --mid:      #3D0060;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: radial-gradient(ellipse at 50% 60%, #3A0060 0%, #1A0030 55%, #0D001E 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    /* ── Starfield ── */
    #stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d,3s) var(--dl,0s) infinite ease-in-out;
    }
    @keyframes twinkle {
      0%,100% { opacity:0.1; transform:scale(0.8); }
      50%      { opacity:1;   transform:scale(1.4); }
    }

    /* ── Natural wing flap on SVG wing groups ── */
    .wing-l {
      transform-box: fill-box;
      transform-origin: right center;
      animation: flapWing var(--flap,0.26s) ease-in-out infinite alternate;
    }
    .wing-r {
      transform-box: fill-box;
      transform-origin: left center;
      animation: flapWing var(--flap,0.26s) ease-in-out infinite alternate;
    }
    @keyframes flapWing {
      0%   { transform: scaleX(1)    skewY(0deg); }
      40%  { transform: scaleX(0.55) skewY(4deg); }
      100% { transform: scaleX(0.06) skewY(8deg); }
    }

    /* Subtle body bob while flying */
    .butterfly { animation: btFlight var(--dur,14s) var(--delay,0s) infinite ease-in-out; }

    /* Silver dust canvas */
    #dustCanvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    /* ── Floating petals (keep for petal container reuse) ── */
    #petals { position:fixed; inset:0; pointer-events:none; z-index:2; overflow:hidden; }

    /* ── Scene wrapper ── */
    #scene {
      position: relative; z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Title above door ── */
    .above-title {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(2.2rem, 6vw, 4rem);
      color: rgba(255,255,255,0.18);
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 0 0 40px rgba(200,168,245,0.3);
      transition: color 1s, text-shadow 1s;
    }
    .above-title.lit {
      color: rgba(255,213,107,0.85);
      text-shadow: 0 0 30px rgba(255,213,107,0.6), 0 0 80px rgba(255,100,200,0.4);
    }

    /* ── Stone arch frame ── */
    .arch-frame {
      position: relative;
      width: clamp(260px, 38vw, 380px);
      filter: drop-shadow(0 0 0px rgba(200,168,245,0));
      transition: filter 1.2s ease;
    }
    .arch-frame.glowing {
      filter: drop-shadow(0 0 40px rgba(200,168,245,0.7)) drop-shadow(0 0 80px rgba(255,100,200,0.4));
    }

    /* ── SVG Door ── */
    #doorSvg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Door panels open animation */
    #doorPanelLeft, #doorPanelRight {
      transform-origin: left center;
      transform-box: fill-box;
      transition: none;
    }
    #doorPanelRight {
      transform-origin: right center;
    }

    .door-open #doorPanelLeft  { animation: swingLeft  1.4s cubic-bezier(.4,0,.2,1) forwards 0.1s; }
    .door-open #doorPanelRight { animation: swingRight 1.4s cubic-bezier(.4,0,.2,1) forwards 0.1s; }

    @keyframes swingLeft  {
      0%   { transform: perspective(600px) rotateY(0deg);    }
      100% { transform: perspective(600px) rotateY(-82deg);  }
    }
    @keyframes swingRight {
      0%   { transform: perspective(600px) rotateY(0deg);    }
      100% { transform: perspective(600px) rotateY(82deg);   }
    }

    /* Glow behind open door */
    #doorGlow {
      opacity: 0;
      transition: opacity 0.8s ease 0.6s;
    }
    .door-open #doorGlow { opacity: 1; }

    /* ── Ivy / grass ground strip ── */
    .ground-strip {
      width: clamp(260px, 38vw, 380px);
      height: 38px;
      background: linear-gradient(to top, #1a4a00, #2a6600, transparent);
      margin-top: -6px;
      border-radius: 0 0 12px 12px;
      position: relative;
    }

    /* ── Passphrase area ── */
    .passphrase-area {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: clamp(260px, 50vw, 440px);
    }

    .hint-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: rgba(200,168,245,0.55);
      letter-spacing: 2px;
      text-align: center;
      transition: opacity 0.5s;
    }
    .hint-text.hidden { opacity: 0; pointer-events: none; }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    #passInput {
      width: 100%;
      padding: 16px 52px 16px 22px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(200,168,245,0.35);
      border-radius: 50px;
      color: rgba(255,255,255,0.9);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
      letter-spacing: 1.5px;
      outline: none;
      transition: border-color 0.4s, background 0.4s, box-shadow 0.4s;
      text-align: center;
      caret-color: var(--gold);
    }
    #passInput::placeholder { color: rgba(200,168,245,0.3); }
    #passInput:focus {
      border-color: rgba(200,168,245,0.7);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 4px rgba(123,47,190,0.2), 0 0 30px rgba(200,168,245,0.15);
    }
    #passInput.correct {
      border-color: var(--gold);
      background: rgba(255,213,107,0.1);
      box-shadow: 0 0 0 4px rgba(255,213,107,0.15), 0 0 40px rgba(255,213,107,0.25);
      color: var(--gold);
    }
    #passInput.wrong {
      border-color: rgba(255,80,80,0.6);
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-10px); }
      40%      { transform: translateX(10px); }
      60%      { transform: translateX(-7px); }
      80%      { transform: translateX(7px); }
    }

    /* Sparkle submit icon inside input */
    .input-icon {
      position: absolute;
      right: 18px; top: 50%;
      transform: translateY(-50%);
      font-size: 1.3rem;
      cursor: pointer;
      transition: transform 0.3s, filter 0.3s;
      filter: opacity(0.4);
    }
    .input-icon:hover { transform: translateY(-50%) scale(1.3); filter: opacity(1); }

    /* Wrong message */
    #wrongMsg {
      font-style: italic;
      font-size: 0.88rem;
      color: rgba(255,140,140,0.7);
      letter-spacing: 1px;
      height: 20px;
      transition: opacity 0.4s;
      opacity: 0;
    }
    #wrongMsg.show { opacity: 1; }

    /* ── Light burst on open ── */
    #lightBurst {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 48%, rgba(255,213,107,0.0) 0%, transparent 80%);
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #lightBurst.flash {
      animation: burstAnim 1.6s ease forwards;
    }
    @keyframes burstAnim {
      0%   { opacity:0; background: radial-gradient(ellipse at 50% 48%, rgba(255,240,180,0.0) 0%, transparent 70%); }
      20%  { opacity:1; background: radial-gradient(ellipse at 50% 48%, rgba(255,240,180,0.95) 0%, rgba(200,168,245,0.6) 50%, transparent 80%); }
      60%  { opacity:1; background: radial-gradient(ellipse at 50% 48%, rgba(255,240,180,0.7) 0%, rgba(200,168,245,0.4) 50%, transparent 80%); }
      100% { opacity:0; }
    }

    /* ── Page transition out ── */
    #pageVeil {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #FF9CE5, #C8A8F5, #A07CF5, #FF79C0);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }
    #pageVeil.cover { opacity: 1; }

    /* ── Butterflies that burst out of the door ── */
    .burst-bt {
      position: fixed;
      pointer-events: none;
      z-index: 60;
      font-size: 1.6rem;
      opacity: 0;
    }
    .burst-bt.fly {
      animation: burstFly var(--dur,1.8s) var(--del,0s) ease forwards;
    }
    @keyframes burstFly {
      0%   { opacity:0;   transform: translate(0,0) scale(0.4) rotate(0deg); }
      20%  { opacity:1; }
      100% { opacity:0;   transform: translate(var(--tx,0),var(--ty,-200px)) scale(1.1) rotate(var(--rot,180deg)); }
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .arch-frame, .ground-strip { width: 90vw; }
      .passphrase-area { width: 90vw; }
    }
    @keyframes btFlight {
      0%   { opacity:0; transform: translate(var(--sx,-12vw), var(--sy,50vh)) scale(var(--sc,1)); }
      8%   { opacity:0.88; }
      20%  { transform: translate(calc(var(--sx) + 18vw), calc(var(--sy) - 14vh)) scale(var(--sc,1)); }
      35%  { transform: translate(calc(var(--sx) + 35vw), calc(var(--sy) + 6vh))  scale(var(--sc,1)); }
      50%  { transform: translate(calc(var(--sx) + 52vw), calc(var(--sy) - 10vh)) scale(var(--sc,1)); }
      65%  { transform: translate(calc(var(--sx) + 70vw), calc(var(--sy) + 8vh))  scale(var(--sc,1)); }
      80%  { transform: translate(calc(var(--sx) + 88vw), calc(var(--sy) - 8vh))  scale(var(--sc,1)); }
      92%  { opacity:0.88; }
      100% { opacity:0; transform: translate(calc(var(--sx) + 116vw), var(--sy,50vh)) scale(var(--sc,1)); }
    }
  </style>
</head>
<body>

  <!-- Silver dust trail canvas (drawn by JS) -->
  <canvas id="dustCanvas"></canvas>

  <!-- Starfield -->
  <div id="stars"></div>
  <!-- Floating petals -->
  <div id="petals"></div>
  <!-- Light burst -->
  <div id="lightBurst"></div>
  <!-- Page veil -->
  <div id="pageVeil"></div>

  <div id="scene">
    <p class="above-title" id="aboveTitle">Fairytopia Library</p>

    <!-- Stone arch + door -->
    <div class="arch-frame" id="archFrame">
      <svg id="doorSvg" viewBox="0 0 380 480" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#FFE08A" stop-opacity="1"/>
            <stop offset="40%"  stop-color="#FFB8E0" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#C8A8F5" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="panelGradL" cx="30%" cy="40%" r="70%">
            <stop offset="0%"   stop-color="#FF9FDB"/>
            <stop offset="50%"  stop-color="#C880F5"/>
            <stop offset="100%" stop-color="#8040C0"/>
          </radialGradient>
          <radialGradient id="panelGradR" cx="70%" cy="40%" r="70%">
            <stop offset="0%"   stop-color="#FFB0E8"/>
            <stop offset="50%"  stop-color="#D090FF"/>
            <stop offset="100%" stop-color="#7030B0"/>
          </radialGradient>
          <linearGradient id="stoneGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#8B7355"/>
            <stop offset="100%" stop-color="#6B5340"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="softGlow">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="archClip">
            <path d="M30,480 L30,210 Q30,20 190,20 Q350,20 350,210 L350,480 Z"/>
          </clipPath>
        </defs>

        <!-- ── Stone wall backdrop ── -->
        <rect x="0" y="0" width="380" height="480" fill="#4A3A28" rx="4"/>
        <!-- Stone texture rows -->
        <g fill="none" stroke="#3A2A18" stroke-width="1.5" opacity="0.6">
          <line x1="0" y1="80"  x2="380" y2="80"/>
          <line x1="0" y1="160" x2="380" y2="160"/>
          <line x1="0" y1="240" x2="380" y2="240"/>
          <line x1="0" y1="320" x2="380" y2="320"/>
          <line x1="0" y1="400" x2="380" y2="400"/>
          <!-- vertical offsets per row -->
          <line x1="80"  y1="0"   x2="80"  y2="80"/>
          <line x1="190" y1="0"   x2="190" y2="80"/>
          <line x1="300" y1="0"   x2="300" y2="80"/>
          <line x1="30"  y1="80"  x2="30"  y2="160"/>
          <line x1="140" y1="80"  x2="140" y2="160"/>
          <line x1="260" y1="80"  x2="260" y2="160"/>
          <line x1="350" y1="80"  x2="350" y2="160"/>
          <line x1="70"  y1="160" x2="70"  y2="240"/>
          <line x1="190" y1="160" x2="190" y2="240"/>
          <line x1="310" y1="160" x2="310" y2="240"/>
        </g>

        <!-- Ivy touches (simplified) -->
        <g opacity="0.55" fill="#2A5A10">
          <ellipse cx="18"  cy="60"  rx="14" ry="9" transform="rotate(-20,18,60)"/>
          <ellipse cx="35"  cy="80"  rx="12" ry="8" transform="rotate(10,35,80)"/>
          <ellipse cx="12"  cy="100" rx="10" ry="7" transform="rotate(-15,12,100)"/>
          <ellipse cx="362" cy="55"  rx="14" ry="9" transform="rotate(20,362,55)"/>
          <ellipse cx="348" cy="75"  rx="12" ry="8" transform="rotate(-10,348,75)"/>
          <ellipse cx="368" cy="95"  rx="10" ry="7" transform="rotate(15,368,95)"/>
        </g>

        <!-- ── Stone arch border ── -->
        <path d="M30,480 L30,210 Q30,20 190,20 Q350,20 350,210 L350,480"
              fill="none" stroke="url(#stoneGrad)" stroke-width="28" stroke-linejoin="round"/>
        <!-- Arch highlight -->
        <path d="M30,480 L30,210 Q30,20 190,20 Q350,20 350,210 L350,480"
              fill="none" stroke="rgba(255,230,160,0.25)" stroke-width="6" stroke-linejoin="round"/>

        <!-- ── Glow behind door (revealed on open) ── -->
        <g id="doorGlow" clip-path="url(#archClip)">
          <ellipse cx="190" cy="250" rx="150" ry="200" fill="url(#glowGrad)" opacity="0.9"/>
        </g>

        <!-- ── Door panels (split at x=190) ── -->
        <g clip-path="url(#archClip)">
          <!-- LEFT panel -->
          <g id="doorPanelLeft">
            <path d="M44,480 L44,215 Q44,40 190,40 L190,480 Z" fill="url(#panelGradL)"/>

            <!-- Swirl scrollwork left -->
            <g fill="none" stroke="#5A0080" stroke-width="2.2" opacity="0.7" filter="url(#glow)">
              <!-- big spiral -->
              <path d="M130,280 C110,260 95,230 115,210 C135,190 165,200 170,225 C175,250 155,265 140,255"/>
              <!-- flowing vine left -->
              <path d="M80,380 C70,350 85,320 100,300 C115,280 130,290 120,310 C110,330 90,325 95,345 C100,365 120,360 115,380"/>
              <!-- small curls -->
              <path d="M60,200 C55,185 65,175 75,180 C85,185 82,198 72,198"/>
              <path d="M155,160 C148,148 155,138 164,143 C173,148 170,160 161,160"/>
            </g>

            <!-- Flowers left panel -->
            <g filter="url(#softGlow)">
              <!-- Flower 1 -->
              <g transform="translate(100,340)">
                <circle r="7" fill="#FF6EC7"/><circle r="3.5" fill="#FFD56B"/>
                <ellipse rx="7" ry="4" fill="#FF6EC7" transform="rotate(0)   translate(0,-10)"/>
                <ellipse rx="7" ry="4" fill="#FF9FE0" transform="rotate(72)  translate(0,-10)"/>
                <ellipse rx="7" ry="4" fill="#FF6EC7" transform="rotate(144) translate(0,-10)"/>
                <ellipse rx="7" ry="4" fill="#FF9FE0" transform="rotate(216) translate(0,-10)"/>
                <ellipse rx="7" ry="4" fill="#FF6EC7" transform="rotate(288) translate(0,-10)"/>
              </g>
              <!-- Flower 2 -->
              <g transform="translate(145,240)">
                <circle r="5.5" fill="#E060FF"/><circle r="2.8" fill="#FFE080"/>
                <ellipse rx="5.5" ry="3.2" fill="#E060FF" transform="rotate(0)   translate(0,-8)"/>
                <ellipse rx="5.5" ry="3.2" fill="#C840FF" transform="rotate(60)  translate(0,-8)"/>
                <ellipse rx="5.5" ry="3.2" fill="#E060FF" transform="rotate(120) translate(0,-8)"/>
                <ellipse rx="5.5" ry="3.2" fill="#C840FF" transform="rotate(180) translate(0,-8)"/>
                <ellipse rx="5.5" ry="3.2" fill="#E060FF" transform="rotate(240) translate(0,-8)"/>
                <ellipse rx="5.5" ry="3.2" fill="#C840FF" transform="rotate(300) translate(0,-8)"/>
              </g>
              <!-- Flower 3 small -->
              <g transform="translate(70,290)">
                <circle r="4" fill="#FF9FDB"/><circle r="2" fill="#FFD56B"/>
                <ellipse rx="4" ry="2.5" fill="#FF9FDB" transform="rotate(0)   translate(0,-6)"/>
                <ellipse rx="4" ry="2.5" fill="#FFB8EC" transform="rotate(90)  translate(0,-6)"/>
                <ellipse rx="4" ry="2.5" fill="#FF9FDB" transform="rotate(180) translate(0,-6)"/>
                <ellipse rx="4" ry="2.5" fill="#FFB8EC" transform="rotate(270) translate(0,-6)"/>
              </g>
              <!-- Tiny orange flower -->
              <g transform="translate(115,400)">
                <circle r="5" fill="#FFA040"/><circle r="2.5" fill="#FFE060"/>
                <ellipse rx="5" ry="3" fill="#FFA040" transform="rotate(0)   translate(0,-7.5)"/>
                <ellipse rx="5" ry="3" fill="#FF8020" transform="rotate(72)  translate(0,-7.5)"/>
                <ellipse rx="5" ry="3" fill="#FFA040" transform="rotate(144) translate(0,-7.5)"/>
                <ellipse rx="5" ry="3" fill="#FF8020" transform="rotate(216) translate(0,-7.5)"/>
                <ellipse rx="5" ry="3" fill="#FFA040" transform="rotate(288) translate(0,-7.5)"/>
              </g>
            </g>

            <!-- Mini butterfly on left panel -->
            <g transform="translate(80,200) scale(0.55)" filter="url(#glow)">
              <path d="M30,20 C25,11 9,3 1,9 C-4,17 5,28 17,24 C23,22 29,20 30,20Z" fill="#80FFFF" opacity="0.85"/>
              <path d="M30,20 C35,11 51,3 59,9 C64,17 55,28 43,24 C37,22 31,20 30,20Z" fill="#80FFFF" opacity="0.85"/>
              <path d="M30,20 C25,26 14,33 8,29 C2,24 7,16 18,19 C25,20 29,20 30,20Z" fill="#40D4D4" opacity="0.75"/>
              <path d="M30,20 C35,26 46,33 52,29 C58,24 53,16 42,19 C35,20 31,20 30,20Z" fill="#40D4D4" opacity="0.75"/>
              <ellipse cx="30" cy="20" rx="1.5" ry="5" fill="#003030" opacity="0.5"/>
            </g>

            <!-- Leaf accents -->
            <g fill="#3A8020" opacity="0.65">
              <ellipse cx="90"  cy="370" rx="9" ry="5" transform="rotate(-30,90,370)"/>
              <ellipse cx="135" cy="420" rx="8" ry="4" transform="rotate(20,135,420)"/>
              <ellipse cx="60"  cy="310" rx="7" ry="4" transform="rotate(-45,60,310)"/>
            </g>
          </g>

          <!-- RIGHT panel -->
          <g id="doorPanelRight">
            <path d="M336,480 L336,215 Q336,40 190,40 L190,480 Z" fill="url(#panelGradR)"/>

            <!-- Swirl scrollwork right (mirror) -->
            <g fill="none" stroke="#5A0080" stroke-width="2.2" opacity="0.7" filter="url(#glow)">
              <path d="M250,280 C270,260 285,230 265,210 C245,190 215,200 210,225 C205,250 225,265 240,255"/>
              <path d="M300,380 C310,350 295,320 280,300 C265,280 250,290 260,310 C270,330 290,325 285,345 C280,365 260,360 265,380"/>
              <path d="M320,200 C325,185 315,175 305,180 C295,185 298,198 308,198"/>
              <path d="M225,160 C232,148 225,138 216,143 C207,148 210,160 219,160"/>
            </g>

            <!-- Central spiral motif (shared, centered) -->
            <g fill="none" stroke="rgba(255,200,240,0.55)" stroke-width="2" opacity="0.8">
              <path d="M190,160 C190,130 215,110 230,130 C245,150 230,175 210,172 C190,169 182,148 190,136"/>
            </g>

            <!-- Flowers right panel -->
            <g filter="url(#softGlow)">
              <g transform="translate(280,340)">
                <circle r="7" fill="#FF6EC7"/><circle r="3.5" fill="#FFD56B"/>
                <ellipse rx="7" ry="4" fill="#FF6EC7" transform="rotate(36)  translate(0,-10)"/>
                <ellipse rx="7" ry="4" fill="#FF9FE0" transform="rotate(108) translate(0,-10)"/>
                <ellipse rx="7" ry="4" fill="#FF6EC7" transform="rotate(180) translate(0,-10)"/>
                <ellipse rx="7" ry="4" fill="#FF9FE0" transform="rotate(252) translate(0,-10)"/>
                <ellipse rx="7" ry="4" fill="#FF6EC7" transform="rotate(324) translate(0,-10)"/>
              </g>
              <g transform="translate(235,240)">
                <circle r="5.5" fill="#60C0FF"/><circle r="2.8" fill="#FFE080"/>

                <ellipse rx="5.5" ry="3.2" fill="#60C0FF" transform="rotate(120) translate(0,-8)"/>
                <ellipse rx="5.5" ry="3.2" fill="#40A0E0" transform="rotate(180) translate(0,-8)"/>

              <g transform="translate(310,290)">
                <circle r="4" fill="#FF9FDB"/><circle r="2" fill="#FFD56B"/>

              <g transform="translate(265,400)">
                <circle r="5" fill="#FFA040"/><circle r="2.5" fill="#FFE060"/>

            <!-- Mini butterfly right -->
            <g transform="translate(290,195) scale(0.55)" filter="url(#glow)">
              <path d="M30,20 C25,11 9,3 1,9 C-4,17 5,28 17,24 C23,22 29,20 30,20Z" fill="#FFD080" opacity="0.85"/>
              <path d="M30,20 C35,11 51,3 59,9 C64,17 55,28 43,24 C37,22 31,20 30,20Z" fill="#FFD080" opacity="0.85"/>
              <path d="M30,20 C25,26 14,33 8,29 C2,24 7,16 18,19 C25,20 29,20 30,20Z" fill="#FFA820" opacity="0.75"/>

            <!-- Leaf accents right -->
            <g fill="#3A8020" opacity="0.65">

          </g>
        </g><!-- end clip -->

        <!-- ── Iron frame scrollwork overlay (on top of panels) ── -->
        <g clip-path="url(#archClip)" fill="none" stroke="#2A0040" stroke-width="3" opacity="0.5">
          <!-- Vertical center divider -->
          <line x1="190" y1="40" x2="190" y2="480"/>

          <path d="M190,80 C175,60 155,62 155,80 C155,98 175,105 190,90 C205,75 215,60 230,65 C245,70 240,88 225,90"/>

          <path d="M80,350 C65,330 70,300 90,295 C110,290 118,310 105,325"/>

        <!-- ── Arch border ornament ── -->
        <path d="M30,480 L30,210 Q30,20 190,20 Q350,20 350,210 L350,480"
              fill="none" stroke="#C8A8F5" stroke-width="3" opacity="0.4" stroke-dasharray="8,6"/>

        <!-- Keystone gem at top of arch -->
        <g transform="translate(190,28)" filter="url(#softGlow)">
          <polygon points="0,-12 10,0 0,10 -10,0" fill="#FFD56B" stroke="#FF9E00" stroke-width="1.5"/>
          <polygon points="0,-7 5,0 0,5 -5,0"  fill="#FFF0A0"/>
        </g>

        <!-- Doorknobs -->
        <circle cx="178" cy="270" r="6.5" fill="#FFD56B" stroke="#B8860B" stroke-width="1.5" filter="url(#glow)"/>
        <circle cx="202" cy="270" r="6.5" fill="#FFD56B" stroke="#B8860B" stroke-width="1.5" filter="url(#glow)"/>

        <!-- Grass at bottom -->
        <g fill="#2A6600">
          <rect x="30" y="456" width="320" height="24" rx="2"/>
          <!-- Grass blades -->
          <path d="M50,456 C48,440 52,432 56,438 C58,448 54,456 50,456Z"/>
          <path d="M75,456 C72,438 78,426 82,434 C85,446 79,456 75,456Z"/>
          <path d="M105,456 C102,442 108,432 112,440 C115,450 109,456 105,456Z"/>
          <path d="M265,456 C262,440 268,428 272,436 C275,448 269,456 265,456Z"/>
          <path d="M295,456 C292,442 298,432 302,440 C305,450 299,456 295,456Z"/>
          <path d="M320,456 C318,440 322,434 326,442 C328,452 322,456 320,456Z"/>
        </g>
      </svg>
    </div><!-- arch-frame -->

    <!-- Passphrase input -->
    <div class="passphrase-area">
      <p class="hint-text" id="hintText">whisper the secret words to enter…</p>
      <div class="input-wrapper">
        <input
          id="passInput"
          type="text"
          placeholder="speak, friend, and enter…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Enter secret passphrase"
        />
        <span class="input-icon" id="submitIcon" role="button" tabindex="0" aria-label="Submit">✦</span>
      </div>
      <p id="wrongMsg">the door remains silent… try again ✦</p>
    </div>
  </div><!-- #scene -->

  <script>
    const SECRET = "dearest gentle reader";

    // ── Monarch Butterfly SVG with wing groups ────────────
    function makeMonarchDoor(hue, flapSpeed) {
      const uid = Math.random().toString(36).slice(2,7);
      return `<svg viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
  <defs>
    <linearGradient id="wg1_${uid}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="hsl(${200+hue},80%,85%)"/>
      <stop offset="50%"  stop-color="hsl(${240+hue},72%,78%)"/>
      <stop offset="100%" stop-color="hsl(${180+hue},65%,88%)"/>
    </linearGradient>
    <linearGradient id="wg2_${uid}" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="hsl(${210+hue},78%,83%)"/>
      <stop offset="50%"  stop-color="hsl(${250+hue},70%,76%)"/>
      <stop offset="100%" stop-color="hsl(${185+hue},63%,86%)"/>
    </linearGradient>
    <linearGradient id="sh_${uid}" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.28"/>
    </linearGradient>
  </defs>
  <!-- LEFT wing group — flaps from right origin (body) -->
  <g class="wing-l" style="--flap:${flapSpeed}s">
    <path d="M80,54 C68,36 42,8 10,14 C-4,22 4,46 18,52 C34,58 56,54 80,54Z" fill="url(#wg1_${uid})" opacity="0.92"/>
    <path d="M80,58 C66,64 38,80 24,74 C10,64 18,46 36,50 C52,54 72,58 80,58Z" fill="url(#wg1_${uid})" opacity="0.85"/>
    <path d="M80,54 C68,36 42,8 10,14 C-4,22 4,46 18,52 C34,58 56,54 80,54Z" fill="url(#sh_${uid})" opacity="0.45"/>
    <path d="M80,54 C68,36 42,8 10,14 C-4,22 4,46 18,52 C34,58 56,54 80,54Z" fill="none" stroke="#0D0018" stroke-width="2.6" opacity="0.7"/>
    <path d="M80,58 C66,64 38,80 24,74 C10,64 18,46 36,50 C52,54 72,58 80,58Z" fill="none" stroke="#0D0018" stroke-width="2.2" opacity="0.65"/>
    <path d="M80,54 C72,42 58,28 38,20" fill="none" stroke="#0D0018" stroke-width="1.5" opacity="0.55"/>
    <path d="M80,54 C70,48 52,42 32,44" fill="none" stroke="#0D0018" stroke-width="1" opacity="0.45"/>
    <path d="M80,58 C72,64 54,68 36,68" fill="none" stroke="#0D0018" stroke-width="1" opacity="0.4"/>
    <g fill="white" opacity="0.88">
      <circle cx="12" cy="18" r="2.2"/><circle cx="7" cy="28" r="1.8"/>
      <circle cx="6"  cy="38" r="1.6"/><circle cx="9" cy="47" r="1.5"/>
      <circle cx="26" cy="73" r="1.7"/><circle cx="37" cy="79" r="1.4"/>
    </g>
  </g>
  <!-- RIGHT wing group — flaps from left origin (body) -->
  <g class="wing-r" style="--flap:${flapSpeed}s">
    <path d="M80,54 C92,36 118,8 150,14 C164,22 156,46 142,52 C126,58 104,54 80,54Z" fill="url(#wg2_${uid})" opacity="0.92"/>
    <path d="M80,58 C94,64 122,80 136,74 C150,64 142,46 124,50 C108,54 88,58 80,58Z" fill="url(#wg2_${uid})" opacity="0.85"/>
    <path d="M80,54 C92,36 118,8 150,14 C164,22 156,46 142,52 C126,58 104,54 80,54Z" fill="url(#sh_${uid})" opacity="0.45"/>
    <path d="M80,54 C92,36 118,8 150,14 C164,22 156,46 142,52 C126,58 104,54 80,54Z" fill="none" stroke="#0D0018" stroke-width="2.6" opacity="0.7"/>
    <path d="M80,58 C94,64 122,80 136,74 C150,64 142,46 124,50 C108,54 88,58 80,58Z" fill="none" stroke="#0D0018" stroke-width="2.2" opacity="0.65"/>
    <path d="M80,54 C88,42 102,28 122,20" fill="none" stroke="#0D0018" stroke-width="1.5" opacity="0.55"/>
    <path d="M80,54 C90,48 108,42 128,44" fill="none" stroke="#0D0018" stroke-width="1" opacity="0.45"/>
    <path d="M80,58 C88,64 106,68 124,68" fill="none" stroke="#0D0018" stroke-width="1" opacity="0.4"/>
    <g fill="white" opacity="0.88">
      <circle cx="148" cy="18" r="2.2"/><circle cx="153" cy="28" r="1.8"/>
      <circle cx="154" cy="38" r="1.6"/><circle cx="151" cy="47" r="1.5"/>
      <circle cx="134" cy="73" r="1.7"/><circle cx="123" cy="79" r="1.4"/>
    </g>
  </g>
  <!-- Antennae & body (always visible, no group) -->
  <line x1="80" y1="50" x2="66" y2="27" stroke="#0D0018" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <line x1="80" y1="50" x2="94" y2="27" stroke="#0D0018" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <circle cx="64" cy="25" r="2.8" fill="#0D0018" opacity="0.75"/>
  <circle cx="96" cy="25" r="2.8" fill="#0D0018" opacity="0.75"/>
  <circle cx="64" cy="25" r="1.3" fill="white" opacity="0.7"/>
  <circle cx="96" cy="25" r="1.3" fill="white" opacity="0.7"/>
  <ellipse cx="80" cy="57" rx="3" ry="12" fill="#0D0018" opacity="0.8"/>
</svg>`;
    }

    // ── Starfield ────────────────────────────────────────
    (function buildStars() {
      const c = document.getElementById('stars');
      for (let i = 0; i < 120; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const sz = 1 + Math.random() * 2.5;
        s.style.cssText = `
          width:${sz}px; height:${sz}px;
          left:${Math.random()*100}%;
          top:${Math.random()*100}%;
          --d:${2+Math.random()*5}s;
          --dl:${Math.random()*8}s;
          opacity:${0.2+Math.random()*0.5};
        `;
        c.appendChild(s);
      }
    })();

    // ── Monarch Butterflies + Silver Dust Trail ──────────
    const btElements = [];

    (function buildButterflies() {
      const c    = document.getElementById('petals');
      c.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden';
      const hues = [0, 40, 80, 140, 200, 260, 320, -20, 10, 170, 50];
      for (let i = 0; i < 11; i++) {
        const bt   = document.createElement('div');
        const sz   = 28 + Math.random() * 38;
        const dur  = 12 + Math.random() * 14;
        const dly  = Math.random() * 22;
        const sy   = Math.random() * 88;
        const sc   = 0.5 + Math.random() * 0.9;
        const flap = (0.20 + Math.random() * 0.18).toFixed(2);
        bt.style.cssText = `
          position:absolute;
          width:${sz}px; height:${sz * 0.7}px;
          opacity:0;
          --dur:${dur}s; --delay:${dly}s; --sx:-14vw; --sy:${sy}vh; --sc:${sc};
          animation: btFlight ${dur}s ${dly}s infinite ease-in-out;
          filter: drop-shadow(0 2px 10px rgba(180,160,255,0.5));
        `;
        bt.innerHTML = makeMonarchDoor(hues[i % hues.length], flap);
        c.appendChild(bt);
        btElements.push(bt);
      }
    })();

    // ── Silver Dust Particle Trail (canvas) ───────────────
    const dustCanvas = document.getElementById('dustCanvas');
    const dctx       = dustCanvas.getContext('2d');
    let   dustParts  = [];

    function resizeDust() {
      dustCanvas.width  = window.innerWidth;
      dustCanvas.height = window.innerHeight;
    }
    resizeDust();
    window.addEventListener('resize', resizeDust);

    function spawnDust() {
      for (const bt of btElements) {
        const r       = bt.getBoundingClientRect();
        if (r.width < 1) continue;
        const opacity = parseFloat(getComputedStyle(bt).opacity);
        if (opacity < 0.06) continue;
        const count   = Math.random() < 0.45 ? 2 : 1;
        for (let k = 0; k < count; k++) {
          dustParts.push({
            x:   r.left + r.width  * (0.15 + Math.random() * 0.7),
            y:   r.top  + r.height * (0.1  + Math.random() * 0.8),
            vx:  (Math.random() - 0.5) * 0.7,
            vy:  -0.3 - Math.random() * 0.75,
            r:   0.8 + Math.random() * 2.0,
            life:1,
            hue: 195 + Math.random() * 130,  // silver → blue-violet
          });
        }
      }
      if (dustParts.length > 700) dustParts.splice(0, dustParts.length - 700);
    }

    function drawDust(ts) {
      dctx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
      spawnDust();

      for (let i = dustParts.length - 1; i >= 0; i--) {
        const p = dustParts[i];
        p.x   += p.vx;
        p.y   += p.vy;
        p.vy  *= 0.975;
        p.vx  *= 0.99;
        p.life -= 0.024;
        if (p.life <= 0) { dustParts.splice(i, 1); continue; }

        const a   = p.life * 0.82;
        const rad = p.r * p.life;

        dctx.save();
        dctx.globalAlpha = a;
        dctx.translate(p.x, p.y);

        // Soft glow aura
        const grd = dctx.createRadialGradient(0,0,0, 0,0,rad*4);
        grd.addColorStop(0,   `hsla(${p.hue},55%,96%,${a})`);
        grd.addColorStop(0.5, `hsla(${p.hue},45%,90%,${a*0.4})`);
        grd.addColorStop(1,   `hsla(${p.hue},40%,92%,0)`);
        dctx.beginPath();
        dctx.arc(0, 0, rad*4, 0, Math.PI*2);
        dctx.fillStyle = grd;
        dctx.fill();

        // Bright core dot
        dctx.beginPath();
        dctx.arc(0, 0, rad, 0, Math.PI*2);
        dctx.fillStyle = `hsla(${p.hue},15%,99%,${a})`;
        dctx.fill();

        // 4-pointed star cross
        dctx.strokeStyle = `hsla(${p.hue},25%,100%,${a*0.85})`;
        dctx.lineWidth   = Math.max(0.4, rad * 0.4);
        dctx.lineCap     = 'round';
        const arm = rad * 3.2;
        dctx.beginPath(); dctx.moveTo(-arm,0); dctx.lineTo(arm,0);  dctx.stroke();
        dctx.beginPath(); dctx.moveTo(0,-arm); dctx.lineTo(0,arm);  dctx.stroke();
        // Diagonal lighter arms
        dctx.globalAlpha = a * 0.35;
        const da = arm * 0.55;
        dctx.beginPath(); dctx.moveTo(-da,-da); dctx.lineTo(da,da);  dctx.stroke();
        dctx.beginPath(); dctx.moveTo( da,-da); dctx.lineTo(-da,da); dctx.stroke();

        dctx.restore();
      }
      requestAnimationFrame(drawDust);
    }
    requestAnimationFrame(drawDust);

    // ── Typewriter highlight ─────────────────────────────
    const input     = document.getElementById('passInput');
    const wrongMsg  = document.getElementById('wrongMsg');
    const hintText  = document.getElementById('hintText');
    const archFrame = document.getElementById('archFrame');
    const aboveTitle= document.getElementById('aboveTitle');
    let   unlocked  = false;

    // Glow the arch as you type the right characters
    input.addEventListener('input', () => {
      if (unlocked) return;
      const val    = input.value.toLowerCase();
      const target = SECRET;
      wrongMsg.classList.remove('show');
      input.classList.remove('wrong', 'correct');

      if (target.startsWith(val) && val.length > 0) {
        // Partial match — pulse arch
        const pct = val.length / target.length;
        archFrame.style.filter = `drop-shadow(0 0 ${pct*40}px rgba(200,168,245,${0.3+pct*0.5}))
                                   drop-shadow(0 0 ${pct*80}px rgba(255,100,200,${0.2+pct*0.3}))`;
        aboveTitle.style.color = `rgba(255,213,107,${0.15+pct*0.7})`;
      } else if (!target.startsWith(val)) {
        archFrame.style.filter = '';
        aboveTitle.style.color = '';
      }
    });

    function tryUnlock() {
      if (unlocked) return;
      const val = input.value.trim().toLowerCase();
      if (val === SECRET) {
        unlocked = true;
        openDoor();
      } else {
        input.classList.add('wrong');
        wrongMsg.classList.add('show');
        archFrame.style.filter = '';
        aboveTitle.style.color = '';
        setTimeout(() => input.classList.remove('wrong'), 600);
        setTimeout(() => wrongMsg.classList.remove('show'), 3000);
      }
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tryUnlock();
    });

    document.getElementById('submitIcon').addEventListener('click', tryUnlock);
    document.getElementById('submitIcon').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') tryUnlock();
    });

    // ── Open Door Sequence ───────────────────────────────
    function openDoor() {
      // 1. Mark input correct
      input.classList.add('correct');
      input.disabled = true;
      hintText.classList.add('hidden');

      // 2. Full glow + trigger CSS door-open class
      archFrame.classList.add('glowing');
      aboveTitle.classList.add('lit');

      // tiny delay, then swing open
      setTimeout(() => {
        document.getElementById('doorSvg').parentElement.classList.add('door-open');
      }, 300);

      // 3. Light burst
      setTimeout(() => {
        const burst = document.getElementById('lightBurst');
        burst.classList.add('flash');
      }, 600);

      // 4. Butterflies burst out
      setTimeout(() => spawnBurstButterflies(), 700);

      // 5. Title swap
      setTimeout(() => {
        aboveTitle.style.fontFamily = "'Pinyon Script', cursive";
        aboveTitle.style.fontSize   = 'clamp(2.5rem, 7vw, 5rem)';
        aboveTitle.textContent = 'Welcome, Gentle Reader ✦';
      }, 900);

      // 6. Veil transition → library
      setTimeout(() => {
        document.getElementById('pageVeil').classList.add('cover');
      }, 2200);

      setTimeout(() => {
        window.location.href = 'entry.html'; // Redirects to the bookshelf
      }, 2900);
    }

    // ── Burst Butterflies ────────────────────────────────
    function spawnBurstButterflies() {
      const emojis = ['🦋','🦋','🌸','✨','🌺','🦋','✦','🌸','🦋'];
      // Get door center position
      const rect = document.getElementById('archFrame').getBoundingClientRect();
      const cx   = rect.left + rect.width / 2;
      const cy   = rect.top  + rect.height * 0.45;

      emojis.forEach((em, i) => {
        const bt = document.createElement('div');
        bt.className = 'burst-bt';
        bt.textContent = em;
        const angle = (360 / emojis.length) * i * (Math.PI/180);
        const dist  = 120 + Math.random() * 180;
        const tx    = Math.cos(angle) * dist;
        const ty    = -Math.abs(Math.sin(angle)) * dist - 60;
        bt.style.cssText = `
          left:${cx}px; top:${cy}px;
          --tx:${tx}px; --ty:${ty}px;
          --dur:${1.4+Math.random()*0.8}s;
          --del:${i*0.08}s;
          --rot:${-180+Math.random()*360}deg;
          transform: translate(-50%,-50%);
        `;
        document.body.appendChild(bt);
        requestAnimationFrame(() => bt.classList.add('fly'));
        setTimeout(() => bt.remove(), 2800);
      });
    }
  </script>
